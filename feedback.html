<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provide Feedback | TLE Organization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://i.imgur.com/x15DQz6.jpeg'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            background-color: #f7f7f7; 
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.4); 
            z-index: -1;
        }

        .section-padding {
            padding-top: 5rem;
            padding-bottom: 5rem;
        }
    </style>
</head>
<body>

    <header id="header" class="sticky top-0 z-50 bg-white border-b border-red-500/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center py-3">
            <a href="index.html" class="flex items-center space-x-3">
                <img src="https://i.imgur.com/UumgAmR.png" alt="DEPED Logo" class="h-10 w-auto rounded-full shadow-md">
                <img src="https://i.imgur.com/ezYRCVu.jpeg" alt="MNHS Logo" class="h-10 w-auto rounded-full shadow-md">
                <img src="https://i.imgur.com/JwTUE7y.png" alt="TLE Logo" class="h-10 w-auto rounded-full shadow-md">
                <span class="text-xl font-extrabold tracking-tight text-gray-900 hidden sm:block">
                    Muntindilaw <span class="text-red-600">TLE</span> Org.
                </span>
            </a>

            <nav class="hidden md:flex space-x-6 font-medium">
                <a href="index.html" class="nav-link text-gray-700 transition duration-150">Home</a>
                <a href="about.html" class="nav-link text-gray-700 hover:text-red-600 transition duration-150">About</a>
                <a href="events.html" class="nav-link text-gray-700 hover:text-red-600 transition duration-150">Events</a>
                <a href="jointle.html" class="nav-link text-gray-700 hover:text-red-600 transition duration-150">Join TLE</a>
                <a href="feedback.html" class="nav-link text-red-600 font-bold">Feedback</a>
            </nav>
            
            <button id="mobile-menu-btn" class="md:hidden p-2 text-blue-700 focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100">
            <div class="px-2 pt-2 pb-3 space-y-1 flex flex-col">
                <a href="index.html" class="block px-3 py-2 text-gray-700">Home</a>
                <a href="about.html" class="block px-3 py-2 text-gray-700">About</a>
                <a href="events.html" class="block px-3 py-2 text-gray-700">Events</a>
                <a href="jointle.html" class="block px-3 py-2 text-gray-700">Join TLE</a>
                <a href="feedback.html" class="block px-3 py-2 text-red-600 font-bold bg-gray-50">Feedback</a>
            </div>
        </div>
    </header>

    <section id="feedback" class="section-padding flex justify-center items-center">
        <div class="max-w-xl w-full mx-4 bg-white p-8 sm:p-10 rounded-xl shadow-2xl border-t-4 border-green-600">
            
            <h1 class="text-3xl font-extrabold text-gray-900 text-center mb-6">
                Share Your <span class="text-green-600">Feedback</span>
            </h1>
            <p class="text-center text-gray-600 mb-8">
                We value your input! Tell us how we can improve our programs and services.
            </p>

            <form action="https://formspree.io/f/xdawwool" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" name="name" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-green-500 outline-none transition duration-150" 
                           placeholder="John Doe">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" name="email" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-green-500 outline-none transition duration-150" 
                           placeholder="you@example.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Message</label>
                    <textarea name="message" rows="4" required 
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-green-500 outline-none transition duration-150" 
                              placeholder="Your suggestions or comments..."></textarea>
                </div>

                <button type="submit" 
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-lg font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none transition duration-200">
                    Submit Feedback
                </button>
            </form>
        </div>
    </section>

    <footer class="bg-gray-800 text-white py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-lg font-bold mb-2">Muntindilaw National High School TLE Organization</p>
            <p class="text-sm text-gray-400">&copy; 2026. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');

            // Mobile Menu Toggle
            if (mobileBtn && mobileMenu) {
                mobileBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });
            }
        });
    </script>

</body>
</html>
