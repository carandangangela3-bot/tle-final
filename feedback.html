<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provide Feedback | TLE Organization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('https://i.imgur.com/x15DQz6.jpeg'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            background-color: #f7f7f7; 
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.4); 
            z-index: -1;
        }

        .section-padding {
            padding-top: 5rem;
            padding-bottom: 5rem;
        }

        #successMessage {
            transition: all 0.4s ease-in-out;
        }
    </style>
</head>
<body>

    <header id="header" class="sticky top-0 z-50 bg-white border-b border-red-500/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center py-3">
            <a href="index.html" class="flex items-center space-x-3">
                <img src="https://i.imgur.com/UumgAmR.png" alt="DEPED Logo" class="h-10 w-auto rounded-full shadow-md">
                <img src="https://i.imgur.com/ezYRCVu.jpeg" alt="MNHS Logo" class="h-10 w-auto rounded-full shadow-md">
                <img src="https://i.imgur.com/JwTUE7y.png" alt="TLE Logo" class="h-10 w-auto rounded-full shadow-md">
                <span class="text-xl font-extrabold tracking-tight text-gray-900 hidden sm:block">
                    Muntindilaw <span class="text-red-600">TLE</span> Org.
                </span>
            </a>

            <nav class="hidden md:flex space-x-6 font-medium">
                <a href="index.html" class="nav-link text-gray-700 transition duration-150">Home</a>
                <a href="about.html" class="nav-link text-gray-700 hover:text-red-600 transition duration-150">About</a>
                <a href="events.html" class="nav-link text-gray-700 hover:text-red-600 transition duration-150">Events</a>
                <a href="jointle.html" class="nav-link text-gray-700 hover:text-red-600 transition duration-150">Join TLE</a>
                <a href="feedback.html" class="nav-link text-red-600 font-bold hover:text-red-600 transition duration-150">Feedback</a>
            </nav>
            
            <button id="mobile-menu-btn" class="md:hidden p-2 text-blue-700 hover:text-red-600 focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 flex flex-col">
                <a href="index.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700">Home</a>
                <a href="about.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700">About</a>
                <a href="events.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700">Events</a>
                <a href="jointle.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-700">Join TLE</a>
                <a href="feedback.html" class="block px-3 py-2 rounded-md text-base font-medium text-red-600 bg-gray-50">Feedback</a>
            </div>
        </div>
    </header>

    <section id="feedback" class="section-padding flex justify-center items-center">
        <div class="max-w-xl w-full mx-4 sm:mx-6 lg:mx-8 bg-white p-8 sm:p-10 rounded-xl shadow-2xl border-t-4 border-green-600 relative overflow-hidden">
            
            <h1 class="text-3xl font-extrabold text-gray-900 text-center mb-6">
                Share Your <span class="text-green-600">Feedback</span>
            </h1>

            <div id="successMessage" class="absolute top-0 left-0 right-0 p-4 rounded-t-lg text-center bg-green-600 text-white z-20 transform scale-95 opacity-0 pointer-events-none" role="alert">
                <p class="font-bold text-lg">Thank you! Your feedback has been sent.</p>
            </div>

            <form action="https://formspree.io/f/xdawwool" method="POST" id="feedbackForm" class="space-y-6">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="name" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-green-500 shadow-sm" placeholder="John Doe">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-green-500 shadow-sm" placeholder="you@example.com">
                </div>

                <div>
                    <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Your Message</label>
                    <textarea id="message" name="message" rows="4" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-green-500 shadow-sm" placeholder="Your suggestions..."></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full flex justify-center py-3 px-4 rounded-lg shadow-md text-lg font-medium text-white bg-green-600 hover:bg-green-700 transition duration-200">
                    Submit Feedback
                </button>
            </form>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('feedbackForm');
            const successMsg = document.getElementById('successMessage');
            const btn = document.getElementById('submitBtn');
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');

            // Mobile Menu
            mobileBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
            });

            // Form Handling
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                btn.disabled = true;
                btn.innerText = "Sending...";

                try {
                    const response = await fetch(form.action, {
                        method: 'POST',
                        body: new FormData(form),
                        headers: { 'Accept': 'application/json' }
                    });

                    if (response.ok) {
                        form.reset();
                        // Pakitang success animation
                        successMsg.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
                        successMsg.classList.add('opacity-100', 'scale-100');

                        setTimeout(() => {
                            successMsg.classList.remove('opacity-100', 'scale-100');
                            successMsg.classList.add('opacity-0', 'scale-95');
                            setTimeout(() => successMsg.classList.add('pointer-events-none'), 400);
                        }, 5000);
                    } else {
                        alert("May error sa pag-submit. Subukan muli.");
                    }
                } catch (err) {
                    alert("Network error. Pakicheck ang internet connection.");
                } finally {
                    btn.disabled = false;
                    btn.innerText = "Submit Feedback";
                }
            });
        });
    </script>
</body>
</html>
