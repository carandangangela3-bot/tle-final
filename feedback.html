<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provide Feedback | TLE Organization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    
      <style>
        body {
            font-family: 'Inter', sans-serif;
	    background-image: url('https://i.imgur.com/x15DQz6.jpeg'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            background-color: #f7f7f7; 
            position: relative;
        }
        
            body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.4); 
            z-index: -1;
        }

        .section-padding {
            padding-top: 5rem;
            padding-bottom: 5rem;
        }
    </style>
</head>
<body>

    <!-- Header & Navigation (FIXED: The structure for logo/title is correct, all links are present) -->
    <header id="header" class="sticky top-0 z-50 bg-white border-b border-red-500/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center py-3">
            <!-- Logo and Title (Acts as a link to home) -->
           <a href="file:///C:/Users/Angela/OneDrive/Desktop/TLE%20ORG-home.html" class="flex items-center space-x-3">
              <img src="https://i.imgur.com/UumgAmR.png" onerror="this.onerror=null;this.src='https://placehold.co/100x100/fecaca/991b1b?text=TLE'" alt="DEPED Logo" class="h-10 w-auto rounded-full shadow-md">

	   <img src="https://i.imgur.com/ezYRCVu.jpeg" onerror="this.onerror=null;this.src='https://placehold.co/100x100/fecaca/991b1b?text=TLE'" alt="MNHS Logo" class="h-10 w-auto rounded-full shadow-md">

           <img src="https://i.imgur.com/JwTUE7y.png" onerror="this.onerror=null;this.src='https://placehold.co/100x100/fecaca/991b1b?text=TLE'" alt="TLE Logo" class="h-10 w-auto rounded-full shadow-md">
                <span class="text-xl font-extrabold tracking-tight text-gray-900 hidden sm:block">
                    Muntindilaw <span class="text-red-600">TLE</span> Org.
                </span>
            </a>

            <!-- Navigation Links (Includes the Home navigator) -->
            <nav class="hidden md:flex space-x-6 font-medium">
                <!-- THIS IS YOUR RETURN HOME LINK -->
                <a href="file:///C:/Users/Angela/OneDrive/Desktop/TLE%20ORG-home.html" class="nav-link text-gray-700 transition duration-150">Home</a>
                <a href="file:///C:/Users/Angela/OneDrive/Desktop/TLE-ORG-officer-page.html" class="nav-link text-gray-700 hover:text-red-600 transition duration-150">About</a>
                <a href="file:///C:/Users/Angela/OneDrive/Desktop/TLE%20ORG-ACTIVITIES.html" class="nav-link text-gray-700 hover:text-red-600 transition duration-150">Events</a>
                <a href="file:///C:/Users/Angela/OneDrive/Desktop/TLE%20ORG-VMC.html" class="nav-link text-gray-700 hover:text-red-600 transition duration-150">Join TLE</a>
                <a href="file:///C:/Users/Angela/OneDrive/Desktop/TLE%20ORG-feedback.html" class="nav-link text-red-600 font-bold hover:text-red-600 transition duration-150">Feedback</a>
            </nav>
        </div>
    </header>


    <!-- Main Content: Feedback Form -->
    <section id="feedback" class="section-padding flex justify-center items-center">
        <!-- Added 'relative' to make successMessage absolute positioning work -->
        <div class="max-w-xl w-full mx-4 sm:mx-6 lg:mx-8 bg-white p-8 sm:p-10 rounded-xl shadow-2xl border-t-4 border-green-600 relative overflow-hidden">
            
            <h1 class="text-3xl font-extrabold text-gray-900 text-center mb-6">
                Share Your <span class="text-green-600">Feedback</span>
            </h1>
            <p class="text-center text-gray-600 mb-8">
                We value your input! Tell us how we can improve our programs and services.
            </p>

            <!-- Success Message (Now absolutely positioned at the top of the card and hidden) -->
            <div id="successMessage" class="absolute top-0 left-0 right-0 p-4 rounded-t-lg text-center bg-green-600 text-white z-20 transform scale-95 opacity-0 pointer-events-none" role="alert">
                <p class="font-bold text-lg">Thank you! Your feedback has been successfully submitted.</p>
            </div>

            <!-- Feedback Form (Stays visible and ready for input) -->
            <form id="feedbackForm" class="space-y-6">
                <!-- Name Field -->
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="name" name="name" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500 transition duration-150 shadow-sm"
                            placeholder="John Doe">
                </div>

                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="email" name="email" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500 transition duration-150 shadow-sm"
                            placeholder="you@example.com">
                </div>

                <!-- Message Field -->
                <div>
                    <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Your Message</label>
                    <textarea id="message" name="message" rows="4" required
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500 transition duration-150 shadow-sm"
                              placeholder="Your suggestions or comments..."></textarea>
                </div>

                <!-- Submit Button -->
                <div>
                    <button type="submit"
                             class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-lg font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition duration-200">
                        Submit Feedback
                    </button>
                </div>
            </form>

        </div>
    </section>

    <!-- Footer for page context -->
   <footer class="bg-gray-800 text-white py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-lg font-bold mb-2">Muntindilaw National High School TLE Organization</p>
            <p class="text-sm text-gray-400">&copy; 2023. All Rights Reserved.</p>
        </div>
    </footer>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const feedbackForm = document.getElementById('feedbackForm');
            const successMessage = document.getElementById('successMessage');

            if (feedbackForm && successMessage) {
                // --- Feedback Form Handling ---
                feedbackForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    
                    console.log('Form submitted. Data collected and reset.');

                    // 1. Show the success message with a smooth transition
                    successMessage.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
                    successMessage.classList.add('opacity-100', 'scale-100');
                    
                    // 2. Reset the form fields immediately (making the fields "blank" but usable)
                    feedbackForm.reset();

                    // 3. Hide the success message after 5 seconds with a smooth transition
                    setTimeout(() => {
                        successMessage.classList.remove('opacity-100', 'scale-100');
                        successMessage.classList.add('opacity-0', 'scale-95');
                        
                        // Disable pointer events after transition finishes
                        setTimeout(() => {
                            successMessage.classList.add('pointer-events-none');
                        }, 300); // Matches the transition duration in CSS
                    }, 5000); // 5 seconds
                });
            } else {
                console.error("Required form elements (feedbackForm or successMessage) not found.");
            }
        });
    </script>

</body>
</html>
