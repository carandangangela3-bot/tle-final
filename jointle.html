       }

        }

            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.4); 
            z-index: -1;
        }

        .section-padding {
            padding-top: 5rem;
            padding-bottom: 5rem;
        }
    </style>

</head>
<body>

    
    <!-- Header & Navigation -->
    <header id="header" class="sticky top-0 z-50 bg-white border-b border-red-500/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center py-3">
               <a href="file:///C:/Users/Angela/OneDrive/Desktop/TLE%20ORG-home.html" class="flex items-center space-x-3">
              <img src="https://i.imgur.com/UumgAmR.png" onerror="this.onerror=null;this.src='https://placehold.co/100x100/fecaca/991b1b?text=TLE'" alt="DEPED Logo" class="h-10 w-auto rounded-full shadow-md">

	   <img src="https://i.imgur.com/ezYRCVu.jpeg" onerror="this.onerror=null;this.src='https://placehold.co/100x100/fecaca/991b1b?text=TLE'" alt="MNHS Logo" class="h-10 w-auto rounded-full shadow-md">

           <img src="https://i.imgur.com/JwTUE7y.png" onerror="this.onerror=null;this.src='https://placehold.co/100x100/fecaca/991b1b?text=TLE'" alt="TLE Logo" class="h-10 w-auto rounded-full shadow-md">
                <span class="text-xl font-extrabold tracking-tight text-gray-900 hidden sm:block">
                    Muntindilaw <span class="text-red-600">TLE</span> Org.
                </span>
            </a>

            <!-- Navigation Links -->
            <nav class="hidden md:flex space-x-6 font-medium"> 
                <a href="file:///C:/Users/Angela/OneDrive/Desktop/TLE%20ORG-home.html" class="nav-link text-gray-700 transition duration-150">Home</a>
                <a href="file:///C:/Users/Angela/OneDrive/Desktop/TLE-ORG-officer-page.html" class="nav-link text-gray-700 hover:text-red-600 transition duration-150">About</a>

                <a href="file:///C:/Users/Angela/OneDrive/Desktop/TLE%20ORG-VMC.html" class="nav-link text-red-600 font-bold hover:text-red-600 transition duration-150">Join TLE</a>
                <a href="file:///C:/Users/Angela/OneDrive/Desktop/TLE%20ORG-feedback.html" class="nav-link text-gray-700 hover:text-red-600 transition duration-150">Feedback</a>
            </nav>
        </div>
    </header>


  <!-- Main Content: Join TLE Form -->
<section id="vision-mission-values" class="section-padding bg-white/80">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-4xl sm:text-5xl font-extrabold text-gray-900 text-center mb-4">
            Join the <span class="text-red-600">TLE</span> Organization
        </h1>
        <p class="text-center text-xl text-gray-600 mb-12 max-w-3xl mx-auto">
            Please fill out the form below to apply as a member of the TLE Organization.
            Make sure all information is correct and complete.
        </p>

        <!-- Form Card -->
        <div class="p-8 bg-white rounded-2xl shadow-xl border-t-8 border-red-600">
            <form id="tleForm" class="space-y-6">

                <!-- Full Name -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Full Name
                    </label>
                    <input type="text" id="fullname" placeholder="Enter your full name"
			class="w-full rounded-lg border-gray-300 focus:border-red-500 focus:ring-red-500">
                </div>

                <!-- Grade & Section -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Grade & Section
                    </label>
                    <input type="text" id="grade" placeholder="e.g. Grade 10 - A"
    			class="w-full rounded-lg border-gray-300 focus:border-red-500 focus:ring-red-500">
                </div>

                <!-- Age -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Age
                    </label>
                    <input type="number" id="age" placeholder="Enter your age"
			class="w-full rounded-lg border-gray-300 focus:border-red-500 focus:ring-red-500">
                </div>

                <!-- Phone Number -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Phone Number
                    </label>
                    <input type="tel" id="phone" placeholder="09XXXXXXXXX"
			class="w-full rounded-lg border-gray-300 focus:border-red-500 focus:ring-red-500">
                </div>

                <!-- Desired Position -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Position You Want to Apply For
                    </label>
                    <select id="position"
		class="w-full rounded-lg border-gray-300 focus:border-red-500 focus:ring-red-500">
  		  <option value="">Select a position</option>
		  <option>President</option>
   		  <option>Vice President</option>
   		  <option>Secretary</option>
   		  <option>Treasurer</option>
		  <option>Auditor</option>
   		  <option>Public Information Officer</option>
		  <option>Business Manager</option>
		  <option>Representative</option>
		</select>
                </div>

                <!-- Submit Button -->
                <div class="pt-4">
                   <button type="submit"
    		class="pump-btn w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition duration-200 shadow-lg">
  		  Submit Application
		   </button>
                </div>

            </form>
        </div>
    </div>
</section>


    <!-- Footer for page context -->
    <footer class="bg-gray-800 text-white py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-lg font-bold mb-2">Muntindilaw National High School TLE Organization</p>
            <p class="text-sm text-gray-400">&copy; 2023. All Rights Reserved.</p>
        </div>
    </footer>

<script>
document.getElementById("tleForm").addEventListener("submit", function (e) {
    e.preventDefault(); // stop form from submitting

    let fullname = document.getElementById("fullname").value.trim();
    let grade = document.getElementById("grade").value.trim();
    let age = document.getElementById("age").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let position = document.getElementById("position").value;

    if (fullname === "") {
        alert("Please enter your full name.");
        return;
    } 
    else if (grade === "") {
        alert("Please enter your grade and section.");
        return;
    } 
    else if (age === "") {
        alert("Please enter your age.");
        return;
    } 
    else if (age <= 0) {
        alert("Please enter a valid age.");
        return;
    } 
    else if (phone === "") {
        alert("Please enter your phone number.");
        return;
    } 
    else if (phone.length < 11) {
        alert("Phone number must be at least 11 digits.");
        return;
    } 
    else if (position === "") {
        alert("Please select the position you want to apply for.");
        return;
    } 
    else {
        alert("Application submitted successfully! Thank you for joining the TLE Organization.");
        this.reset(); // clears the form
    }
});
</script>


</body>
</html>
