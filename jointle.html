<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join TLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        @keyframes pump {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.02); } /* Subtler pump */
            100% { transform: scale(1); }
        }

        .pump-btn:hover {
            animation: pump 0.4s ease-in-out;
        }
  
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)), 
                        url('https://i.imgur.com/x15DQz6.jpeg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
        }

        .section-padding {
            padding-top: 4rem;
            padding-bottom: 4rem;
        }
        
        /* Lightening the input feel */
        input, select {
            background-color: #f9fafb !important;
            transition: all 0.2s ease;
        }
        
        input:focus, select:focus {
            background-color: #ffffff !important;
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="text-gray-800">

    <header id="header" class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center py-3">
            <a href="index.html" class="flex items-center space-x-3">
                <img src="https://i.imgur.com/JwTUE7y.png" onerror="this.onerror=null;this.src='https://placehold.co/100x100/fecaca/991b1b?text=TLE'" alt="TLE Logo" class="h-9 w-auto">
                <span class="text-lg font-bold tracking-tight text-gray-900 hidden sm:block">
                    Muntindilaw <span class="text-red-500">TLE</span>
                </span>
            </a>

            <nav class="hidden md:flex space-x-8 text-sm font-semibold"> 
                <a href="index.html" class="text-gray-500 hover:text-red-500 transition">Home</a>
                <a href="about.html" class="text-gray-500 hover:text-red-500 transition">About</a>
                <a href="events.html" class="text-gray-500 hover:text-red-500 transition">Events</a>
                <a href="jointle.html" class="text-red-500">Join TLE</a>
                <a href="feedback.html" class="text-gray-500 hover:text-red-500 transition">Feedback</a>
            </nav>
            
             <button id="mobile-menu-btn" class="md:hidden p-2 text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>
    </header>

    <section class="section-padding">
        <div class="max-w-2xl mx-auto px-6">
            <div class="text-center mb-10">
                <h1 class="text-3xl sm:text-4xl font-black text-gray-900 mb-3">
                    Become a Member
                </h1>
                <p class="text-gray-500 text-sm sm:text-base">
                    Join the Muntindilaw TLE community today. It only takes a minute.
                </p>
            </div>

            <div class="bg-white/70 backdrop-blur-lg rounded-3xl p-8 shadow-2xl shadow-gray-200/50 border border-white">
                <form action="https://formspree.io/f/xdawwnql" method="POST" id="tleForm" class="space-y-5">

                    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
                        <div class="sm:col-span-2">
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2 ml-1">Full Name</label>
                            <input type="text" id="fullname" name="Full Name" placeholder="John Doe"
                            class="w-full px-4 py-3 rounded-xl border-gray-200 border focus:border-red-400 focus:ring-0 text-gray-700 outline-none">
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2 ml-1">Grade & Section</label>
                            <input type="text" id="grade" name="Grade & Section" placeholder="10 - Diamond"
                            class="w-full px-4 py-3 rounded-xl border-gray-200 border focus:border-red-400 focus:ring-0 text-gray-700 outline-none">
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2 ml-1">Age</label>
                            <input type="number" id="age" name="Age" placeholder="16"
                            class="w-full px-4 py-3 rounded-xl border-gray-200 border focus:border-red-400 focus:ring-0 text-gray-700 outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2 ml-1">Phone Number</label>
                        <input type="tel" id="phone" name="Phone Number" placeholder="0912 345 6789"
                        class="w-full px-4 py-3 rounded-xl border-gray-200 border focus:border-red-400 focus:ring-0 text-gray-700 outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2 ml-1">Target Position</label>
                        <select id="position" name="Position"
                        class="w-full px-4 py-3 rounded-xl border-gray-200 border focus:border-red-400 focus:ring-0 text-gray-600 outline-none appearance-none">
                            <option value="">Choose a role...</option>
                            <option>President</option>
                            <option>Vice President</option>
                            <option>Secretary</option>
                            <option>Treasurer</option>
                            <option>Auditor</option>
                            <option>Public Information Officer</option>
                            <option>Business Manager</option>
                            <option>Representative</option>
                        </select>
                    </div>

                    <div class="pt-4">
                        <button type="submit"
                        class="pump-btn w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-2xl transition duration-300 shadow-lg shadow-red-200">
                        Submit Application
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer class="py-10">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold">&copy; 2026 Muntindilaw TLE Organization</p>
        </div>
    </footer>

    <script>
        // ... (Same logic as before, keeps your functionality intact)
        document.getElementById("tleForm").addEventListener("submit", function (e) {
            let fullname = document.getElementById("fullname").value.trim();
            let grade = document.getElementById("grade").value.trim();
            let age = document.getElementById("age").value.trim();
            let phone = document.getElementById("phone").value.trim();
            let position = document.getElementById("position").value;

            if (!fullname || !grade || !age || phone.length < 11 || !position) {
                alert("Please ensure all fields are filled correctly.");
                e.preventDefault();
                return;
            }

            alert("Application sending! Good luck!");
        });
    </script>
</body>
</html>
